<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>AT CAPACITY</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; background: #0a0a0a; color: #fff; }
      main { width: min(100% - 40px, 360px); text-align: center; padding-bottom: env(safe-area-inset-bottom); }
      img { width: 88px; height: 88px; border-radius: 19px; }
      h1 { margin: 24px 0 10px; font-size: 25px; letter-spacing: 0; }
      p { margin: 0; color: #b9b4bc; font-size: 15px; line-height: 1.55; }
      button { margin-top: 24px; min-height: 48px; border: 0; border-radius: 8px; padding: 0 22px; background: #e040d0; color: #fff; font: inherit; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <img src="shift-icon-512x512.png" alt="" />
      <h1>You're offline</h1>
      <p>Reconnect to the internet, then try loading AT CAPACITY again.</p>
      <button type="button" onclick="retryShift()">Try again</button>
    </main>
    <script src="runtime-config.js"></script>
    <script>
      function retryShift() {
        var serverUrl = window.__SHIFT_NATIVE_CONFIG__ && window.__SHIFT_NATIVE_CONFIG__.serverUrl;
        if (serverUrl) window.location.replace(new URL("/portal", serverUrl).href);
      }
    </script>
  </body>
</html>
